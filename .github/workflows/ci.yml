name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-check:
    name: Repo Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate project structure
        shell: bash
        run: |
          set -euo pipefail
          test -f "3d/BorosRocket.stl"
          test -d "firmware"
          test -d "sim/flight"
          test -d "sim/3d"
          if grep -RIn --exclude-dir=.git -E '^(<<<<<<<|=======|>>>>>>>)' .; then
            echo "Merge conflict markers found."
            exit 1
          fi
          echo "Repository structure check passed."

  firmware-build:
    name: Firmware Build
    runs-on: ubuntu-latest
    needs: repo-check
    env:
      ARM_GCC_ARCHIVE: arm-gnu-toolchain-13.2.Rel1-x86_64-arm-none-eabi.tar.xz
      ARM_GCC_URL: https://developer.arm.com/-/media/Files/downloads/gnu/13.2.rel1/binrel/arm-gnu-toolchain-13.2.Rel1-x86_64-arm-none-eabi.tar.xz
      ARM_GCC_DIR: .cache/arm-gcc
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore ARM GNU toolchain cache
        id: cache-arm-gcc
        uses: actions/cache@v4
        with:
          path: .cache/arm-gcc
          key: arm-gcc-13.2-rel1-linux-x86_64

      - name: Download ARM GNU toolchain
        if: steps.cache-arm-gcc.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${ARM_GCC_DIR}"
          curl -L --retry 3 --retry-delay 3 "${ARM_GCC_URL}" -o "${RUNNER_TEMP}/${ARM_GCC_ARCHIVE}"
          tar -xJf "${RUNNER_TEMP}/${ARM_GCC_ARCHIVE}" -C "${ARM_GCC_DIR}" --strip-components=1

      - name: Add ARM GCC to PATH
        shell: bash
        run: echo "$GITHUB_WORKSPACE/${ARM_GCC_DIR}/bin" >> "${GITHUB_PATH}"

      - name: Build firmware
        shell: bash
        run: |
          set -euo pipefail
          make firmware CC=arm-none-eabi-gcc OBJCOPY=arm-none-eabi-objcopy
          arm-none-eabi-gcc --version

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-build
          if-no-files-found: error
          path: |
            firmware/firmware.elf
            firmware/firmware.bin

  python-sim:
    name: Python Simulations
    runs-on: ubuntu-latest
    needs: firmware-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: sim/flight/requirements.txt

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r sim/flight/requirements.txt

      - name: Run Python checks and simulations
        shell: bash
        run: |
          set -euo pipefail
          make python-check PYTHON=python
          make python-sim PYTHON=python

      - name: Upload Python simulation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-sim
          if-no-files-found: error
          path: |
            sim/flight/out/**

  ci-simulation-report:
    name: CI Simulation Report
    runs-on: ubuntu-latest
    needs:
      - firmware-build
      - python-sim
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            sim/flight/requirements.txt
            tools/requirements.txt

      - name: Install Python dependencies for report job
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r sim/flight/requirements.txt
          pip install -r tools/requirements.txt

      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware-build
          path: artifacts/firmware

      - name: Download Python simulation artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-sim
          path: artifacts/python-sim

      - name: Materialize artifacts into expected paths
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p firmware sim/flight/out

          FW_BIN="$(find artifacts/firmware -type f -name firmware.bin | head -n 1)"
          FW_ELF="$(find artifacts/firmware -type f -name firmware.elf | head -n 1)"
          if [ -z "${FW_BIN}" ] || [ -z "${FW_ELF}" ]; then
            echo "Firmware artifacts not found after download."
            exit 1
          fi
          cp "${FW_BIN}" firmware/firmware.bin
          cp "${FW_ELF}" firmware/firmware.elf

          if [ -d artifacts/python-sim/sim/flight/out ]; then
            cp -a artifacts/python-sim/sim/flight/out/. sim/flight/out/
          elif [ -d artifacts/python-sim/out ]; then
            cp -a artifacts/python-sim/out/. sim/flight/out/
          else
            find artifacts/python-sim -type f \( -name '*.json' -o -name '*.csv' \) | while read -r f; do
              cp "$f" sim/flight/out/
            done
          fi

      - name: Replay firmware processing against simulation data
        shell: bash
        run: |
          set -euo pipefail
          make python-firmware-playback PYTHON=python

      - name: Compute mass budget from 3D model + motor + PCB plate
        shell: bash
        run: |
          set -euo pipefail
          make python-mass-budget PYTHON=python

      - name: Generate CI summary
        shell: bash
        run: |
          set -euo pipefail
          python tools/ci_report.py --out sim/flight/out/ci-summary.md
          cat sim/flight/out/ci-summary.md >> "${GITHUB_STEP_SUMMARY}"
          if [ -f sim/flight/out/mass_budget.md ]; then
            cat sim/flight/out/mass_budget.md >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload CI report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-simulation-report
          if-no-files-found: error
          path: |
            sim/flight/out/ci-summary.md
            sim/flight/out/firmware_playback_summary.json
            sim/flight/out/mass_budget.json
            sim/flight/out/mass_budget.md
