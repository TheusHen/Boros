name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-check:
    name: Repo Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate project structure
        shell: bash
        run: |
          set -euo pipefail
          test -f "3d/BorosRocket.stl"
          test -d "firmware"
          test -d "sim/flight"
          test -d "sim/3d"
          if grep -RIn --exclude-dir=.git -E '^(<<<<<<<|=======|>>>>>>>)' .; then
            echo "Merge conflict markers found."
            exit 1
          fi
          echo "Repository structure check passed."

  firmware-build:
    name: Firmware Build
    runs-on: ubuntu-latest
    needs: repo-check
    env:
      ARM_GCC_ARCHIVE: arm-gnu-toolchain-13.2.Rel1-x86_64-arm-none-eabi.tar.xz
      ARM_GCC_URL: https://developer.arm.com/-/media/Files/downloads/gnu/13.2.rel1/binrel/arm-gnu-toolchain-13.2.Rel1-x86_64-arm-none-eabi.tar.xz
      ARM_GCC_DIR: ${{ runner.temp }}/arm-gcc
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore ARM GNU toolchain cache
        id: cache-arm-gcc
        uses: actions/cache@v4
        with:
          path: ${{ env.ARM_GCC_DIR }}
          key: arm-gcc-13.2-rel1-linux-x86_64

      - name: Download ARM GNU toolchain
        if: steps.cache-arm-gcc.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${ARM_GCC_DIR}"
          curl -L --retry 3 --retry-delay 3 "${ARM_GCC_URL}" -o "${RUNNER_TEMP}/${ARM_GCC_ARCHIVE}"
          tar -xJf "${RUNNER_TEMP}/${ARM_GCC_ARCHIVE}" -C "${ARM_GCC_DIR}" --strip-components=1

      - name: Add ARM GCC to PATH
        shell: bash
        run: echo "${ARM_GCC_DIR}/bin" >> "${GITHUB_PATH}"

      - name: Build firmware
        shell: bash
        run: |
          set -euo pipefail
          make firmware
          arm-none-eabi-gcc --version

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-build
          if-no-files-found: error
          path: |
            firmware/firmware.elf
            firmware/firmware.bin

  python-sim:
    name: Python Simulations
    runs-on: ubuntu-latest
    needs: repo-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: sim/flight/requirements.txt

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r sim/flight/requirements.txt

      - name: Run Python checks and simulations
        shell: bash
        run: |
          set -euo pipefail
          make python-check PYTHON=python
          make python-sim PYTHON=python

      - name: Generate CI summary
        shell: bash
        run: |
          set -euo pipefail
          python tools/ci_report.py --out sim/flight/out/ci-summary.md
          cat sim/flight/out/ci-summary.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload Python simulation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-sim
          if-no-files-found: error
          path: |
            sim/flight/out/**

  matlab-or-octave:
    name: 3D Sim (MATLAB fallback Octave)
    runs-on: ubuntu-latest
    needs: repo-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select 3D simulation backend
        id: backend
        env:
          MATLAB_LICENSE_TOKEN: ${{ secrets.MATLAB_LICENSE_TOKEN }}
          MLM_LICENSE_TOKEN: ${{ secrets.MLM_LICENSE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TOKEN="${MLM_LICENSE_TOKEN:-}"
          if [ -z "${TOKEN}" ]; then
            TOKEN="${MATLAB_LICENSE_TOKEN:-}"
          fi
          if [ -n "${TOKEN}" ]; then
            echo "backend=matlab" >> "${GITHUB_OUTPUT}"
            echo "MATLAB_TOKEN_SELECTED=${TOKEN}" >> "${GITHUB_ENV}"
            echo "Using MATLAB backend."
          else
            echo "backend=octave" >> "${GITHUB_OUTPUT}"
            echo "Using Octave fallback backend."
          fi

      - name: Setup MATLAB
        id: matlab-setup
        if: steps.backend.outputs.backend == 'matlab'
        continue-on-error: true
        uses: matlab-actions/setup-matlab@v2
        with:
          cache: true
        env:
          MLM_LICENSE_TOKEN: ${{ env.MATLAB_TOKEN_SELECTED }}

      - name: Run 3D simulation with MATLAB
        id: matlab-run
        if: steps.backend.outputs.backend == 'matlab' && steps.matlab-setup.outcome == 'success'
        continue-on-error: true
        uses: matlab-actions/run-command@v2
        with:
          command: "cd('sim/3d'); test_aero_limits; run_ci_sim;"
        env:
          MLM_LICENSE_TOKEN: ${{ env.MATLAB_TOKEN_SELECTED }}

      - name: Install Octave
        if: |
          steps.backend.outputs.backend == 'octave' ||
          steps.matlab-setup.outcome == 'failure' ||
          steps.matlab-run.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends octave
          octave --version

      - name: Run 3D simulation with Octave
        if: |
          steps.backend.outputs.backend == 'octave' ||
          steps.matlab-setup.outcome == 'failure' ||
          steps.matlab-run.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          make sim-3d-octave OCTAVE=octave

      - name: Generate CI summary
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ steps.backend.outputs.backend }}" = "matlab" ] && [ "${{ steps.matlab-run.outcome }}" = "success" ]; then
            echo "3D backend: MATLAB" >> "${GITHUB_STEP_SUMMARY}"
          elif [ "${{ steps.backend.outputs.backend }}" = "matlab" ]; then
            echo "3D backend: Octave fallback (MATLAB unavailable/failed)" >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "3D backend: Octave" >> "${GITHUB_STEP_SUMMARY}"
          fi
          python3 tools/ci_report.py --out sim/3d/out/ci-summary.md
          cat sim/3d/out/ci-summary.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload 3D simulation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sim-3d
          if-no-files-found: error
          path: |
            sim/3d/out/**
